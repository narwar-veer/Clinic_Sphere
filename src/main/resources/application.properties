spring.application.name=clinic-booking-system

server.port=${PORT:${SERVER_PORT:8085}}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jackson.default-property-inclusion=non_null

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}

app.time-zone=${APP_TIME_ZONE:Asia/Kolkata}
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.issuer=${JWT_ISSUER:clinic-app}
app.jwt.audience=${JWT_AUDIENCE:clinic-api}
app.jwt.clock-skew-seconds=${JWT_CLOCK_SKEW_SECONDS:30}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
app.booking.time-zone=${BOOKING_TIME_ZONE:${APP_TIME_ZONE:Asia/Kolkata}}
app.appointment.eod-zone=${APPOINTMENT_EOD_ZONE:${APP_TIME_ZONE:Asia/Kolkata}}
app.appointment.eod-cron=${APPOINTMENT_EOD_CRON:0 55 23 * * *}
app.session.inactivity-timeout-minutes=${SESSION_INACTIVITY_TIMEOUT_MINUTES:30}
app.session.touch-throttle-seconds=${SESSION_TOUCH_THROTTLE_SECONDS:120}
app.security.login-rate-limit.max-attempts=${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:8}
app.security.login-rate-limit.window-seconds=${LOGIN_RATE_LIMIT_WINDOW_SECONDS:60}
app.booking.idempotency-ttl-hours=${BOOKING_IDEMPOTENCY_TTL_HOURS:24}
app.slot.generation.max-days-per-request=${SLOT_GENERATION_MAX_DAYS_PER_REQUEST:31}
app.outbox.poll-cron=${OUTBOX_POLL_CRON:*/20 * * * * *}
app.outbox.batch-size=${OUTBOX_BATCH_SIZE:100}
app.outbox.max-retries=${OUTBOX_MAX_RETRIES:10}
app.outbox.base-retry-seconds=${OUTBOX_BASE_RETRY_SECONDS:30}
app.outbox.lock-minutes=${OUTBOX_LOCK_MINUTES:5}
app.http.connect-timeout-ms=${HTTP_CONNECT_TIMEOUT_MS:3000}
app.http.read-timeout-ms=${HTTP_READ_TIMEOUT_MS:5000}

notification.twilio.enabled=${TWILIO_ENABLED}
notification.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
notification.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
notification.twilio.from-phone=${TWILIO_FROM_PHONE:}

notification.whatsapp.enabled=${WHATSAPP_ENABLED}
notification.whatsapp.api-url=${WHATSAPP_API_URL:}
notification.whatsapp.token=${WHATSAPP_TOKEN:}
notification.whatsapp.from-number=${WHATSAPP_FROM_NUMBER:}

seed.admin.enabled=${SEED_ADMIN_ENABLED:false}
seed.admin.username=${SEED_ADMIN_USERNAME:}
seed.admin.password=${SEED_ADMIN_PASSWORD:}

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=never
management.observations.key-values.application=${spring.application.name}
